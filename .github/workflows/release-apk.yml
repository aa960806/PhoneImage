name: Release APK

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  publish:
    name: Publish APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare APK
        run: cp release-assets/PhoneImage-${{ github.ref_name }}.apk PhoneImage-${{ github.ref_name }}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: PhoneImage-${{ github.ref_name }}.apk
          generate_release_notes: true
